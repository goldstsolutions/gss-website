<!--
╔══════════════════════════════════════════════════════════════════╗
║          GOOGLE FORM SETUP GUIDE — READ BEFORE LAUNCH           ║
╠══════════════════════════════════════════════════════════════════╣
║                                                                  ║
║  STEP 1 — Create a Google Form                                   ║
║  Go to forms.google.com → Blank form                             ║
║  Add these fields (Short Answer for all):                        ║
║    1. First Name                                                 ║
║    2. Email Address                                              ║
║    3. Process Name                                               ║
║    4. Team Size                                                  ║
║    5. Hours Per Week                                             ║
║    6. Hourly Cost                                                ║
║    7. AI Reduction %                                             ║
║    8. Annual Cost                                                ║
║    9. Annual Savings                                             ║
║   10. Hours Saved Per Year                                       ║
║                                                                  ║
║  STEP 2 — Get your Form ID                                       ║
║  Your form URL looks like:                                       ║
║  https://docs.google.com/forms/d/FORM_ID_HERE/edit               ║
║  Copy the FORM_ID_HERE part → paste below as GOOGLE_FORM_ID     ║
║                                                                  ║
║  STEP 3 — Get entry IDs for each field                           ║
║  Open your form → click ⋮ → "Get pre-filled link"               ║
║  Fill in dummy values → click "Get link"                         ║
║  The URL will contain entry.XXXXXXXXX=value for each field       ║
║  Copy those entry IDs → paste below                              ║
║                                                                  ║
║  STEP 4 — Set up email notifications                             ║
║  In your linked Google Sheet → Extensions → Apps Script →       ║
║  paste the trigger script from the comment at bottom of file     ║
║                                                                  ║
║  STEP 5 — Test                                                   ║
║  Submit the form → check your Sheet and inbox                    ║
║                                                                  ║

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --gold: #D4B96A;
  --gold-bright: #E2CB85;
  --gold-muted: #A8904E;
  --gold-dim: rgba(212,185,106,0.09);
  --gold-dim-mid: rgba(212,185,106,0.16);
  --gold-border: rgba(212,185,106,0.16);
  --gold-border-mid: rgba(212,185,106,0.34);
  --void: #07090D;
  --navy: #0B1220;
  --navy-mid: #0F1A2E;
  --navy-light: #142035;
  --white: #FFFFFF;
  --text-primary: rgba(255,255,255,0.94);
  --text-body: rgba(255,255,255,0.60);
  --text-muted: rgba(255,255,255,0.28);
  --success: #4CAF82;
  --error: #C05252;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(212,185,106,0.032) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,185,106,0.032) 1px, transparent 1px);
  background-size: 58px 58px;
  pointer-events: none; z-index: 0;
}
.orb {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 0;
}
.orb-1 { width:700px;height:700px;top:-250px;right:-180px;background:radial-gradient(circle,rgba(212,185,106,0.06) 0%,transparent 65%); }
.orb-2 { width:500px;height:500px;bottom:-200px;left:-80px;background:radial-gradient(circle,rgba(212,185,106,0.04) 0%,transparent 65%); }

/* ── SHELL ── */
.shell {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 40px 20px 80px;
}

/* ── LOGO BAR ── */
.logo-bar {
  width: 100%; max-width: 560px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 52px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--gold-border);
}
.logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; font-weight: 800;
  text-transform: uppercase; letter-spacing: -0.01em; color: var(--white);
}
.logo span { color: var(--gold); }
.logo-badge {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.36em; text-transform: uppercase;
  color: var(--gold-muted); background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  padding: 5px 14px; border-radius: 2px;
}

/* ── PROGRESS TRACK ── */
.progress-track {
  width: 100%; max-width: 560px;
  margin-bottom: 36px;
}
.progress-steps {
  display: flex; gap: 6px; align-items: center;
  margin-bottom: 10px;
}
.progress-step {
  height: 3px; flex: 1; border-radius: 2px;
  background: rgba(255,255,255,0.07);
  transition: background 0.4s ease;
}
.progress-step.done { background: var(--gold); }
.progress-step.active { background: var(--gold-muted); }
.progress-meta {
  display: flex; justify-content: space-between;
}
.progress-label {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--gold-muted);
}
.progress-count {
  font-size: 10px; color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

/* ── CARD ── */
.step-card {
  width: 100%; max-width: 560px;
  background: var(--navy);
  border: 1px solid var(--gold-border);
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  animation: slideIn 0.38s cubic-bezier(0.4,0,0.2,1) both;
}
.step-card::before {
  content:''; position:absolute; top:0;left:0;right:0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright) 50%, var(--gold));
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-14px); }
}
.sliding-out { animation: slideOut 0.22s ease forwards; }

.step-body { padding: 40px 44px 36px; }

/* ── QUESTION LAYOUT ── */
.step-eyebrow {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--gold-muted); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.step-eyebrow::before { content:''; width:16px; height:1px; background: var(--gold-muted); }

.step-question {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.02em; line-height: 1.2;
  color: var(--white); margin-bottom: 8px;
}
.step-question span { color: var(--gold); }

.step-hint {
  font-size: 13px; color: var(--text-muted);
  line-height: 1.6; margin-bottom: 32px;
}

/* ── OPTION TILES ── */
.option-tiles {
  display: flex; flex-direction: column; gap: 9px;
  margin-bottom: 28px;
}
.option-tile {
  display: flex; align-items: center; gap: 14px;
  background: var(--navy-mid);
  border: 1px solid var(--gold-border);
  border-radius: 9px; padding: 14px 18px;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s, transform 0.15s;
  text-align: left; width: 100%;
}
.option-tile:hover {
  border-color: var(--gold-border-mid); background: var(--navy-light);
  transform: translateX(3px);
}
.option-tile.selected {
  border-color: var(--gold); background: var(--gold-dim-mid);
}
.option-tile.selected .tile-dot {
  background: var(--gold); border-color: var(--gold);
}
.option-tile.selected .tile-dot::after {
  content: ''; position:absolute; width:7px; height:7px;
  border-radius:50%; background: var(--void);
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.tile-dot {
  width: 20px; height: 20px; border-radius:50%;
  border: 1.5px solid var(--gold-border-mid);
  position: relative; flex-shrink:0;
  transition: all 0.18s;
}
.tile-text { font-size: 14px; color: var(--text-body); line-height: 1.4; transition: color 0.18s; }
.option-tile.selected .tile-text { color: var(--text-primary); }

/* ── NUMBER INPUT ── */
.number-input-wrap {
  margin-bottom: 28px;
}
.big-input-row {
  display: flex; align-items: stretch; gap: 0;
  background: var(--navy-mid);
  border: 1px solid var(--gold-border);
  border-radius: 9px; overflow: hidden;
  transition: border-color 0.2s;
}
.big-input-row:focus-within { border-color: var(--gold-border-mid); }
.big-prefix {
  padding: 0 16px;
  display: flex; align-items: center;
  background: rgba(212,185,106,0.06);
  border-right: 1px solid var(--gold-border);
  font-family: 'DM Mono', monospace;
  font-size: 18px; font-weight: 500;
  color: var(--gold-muted);
  flex-shrink: 0;
}
.big-suffix {
  padding: 0 16px;
  display: flex; align-items: center;
  background: rgba(212,185,106,0.06);
  border-left: 1px solid var(--gold-border);
  font-family: 'DM Mono', monospace;
  font-size: 14px; font-weight: 500;
  color: var(--gold-muted); flex-shrink: 0;
  white-space: nowrap;
}
.big-input {
  flex: 1; padding: 20px 18px;
  background: transparent; border: none; outline: none;
  font-family: 'DM Mono', monospace;
  font-size: 28px; font-weight: 500;
  color: var(--white); min-width: 0;
  -moz-appearance: textfield;
}
.big-input::-webkit-outer-spin-button,
.big-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.big-input::placeholder { color: var(--text-muted); }

/* ── SLIDER ── */
.slider-section { margin-bottom: 28px; }
.slider-value-display {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 52px; font-weight: 800;
  letter-spacing: -0.04em; color: var(--gold);
  line-height: 1; margin-bottom: 16px;
  text-align: center;
}
.slider-value-display span {
  font-size: 22px; color: var(--gold-muted); font-weight: 700;
}
.big-slider {
  width: 100%; height: 4px;
  -webkit-appearance: none; appearance: none;
  background: linear-gradient(90deg, var(--gold) var(--pct,70%), rgba(255,255,255,0.08) var(--pct,70%));
  border-radius: 2px; cursor: pointer; outline: none;
  margin-bottom: 10px;
}
.big-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--navy); border: 2.5px solid var(--gold);
  cursor: pointer;
  box-shadow: 0 0 0 4px rgba(212,185,106,0.18);
  transition: box-shadow 0.2s;
}
.big-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 0 7px rgba(212,185,106,0.22);
}
.slider-marks {
  display: flex; justify-content: space-between;
}
.slider-mark {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--text-muted);
}
.slider-context {
  font-size: 12px; color: var(--text-muted);
  text-align: center; margin-top: 10px; line-height: 1.5;
  min-height: 36px;
  font-style: italic;
}

/* Textarea */
textarea.big-input {
  width: 100%; background: var(--navy-mid);
  border: 1px solid var(--gold-border);
  border-radius: 9px; color: var(--white);
  outline: none; transition: border-color 0.2s, background 0.2s;
}
textarea.big-input:focus {
  border-color: var(--gold-border-mid); background: var(--navy-light);
}
textarea.big-input::placeholder { color: var(--text-muted); }

/* Category section label */
.field-section-label {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--gold-muted); margin-bottom: 10px;
}

/* Compact category tiles */
.cat-tiles { flex-direction: row !important; flex-wrap: wrap; gap: 8px !important; }
.cat-tiles .option-tile {
  flex: 1; min-width: 80px;
  padding: 11px 14px !important;
  justify-content: center;
}
.cat-tiles .tile-dot { display: none; }
.cat-tiles .tile-text {
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-align: center;
}

/* ── LIVE PREVIEW ── */
.live-preview {
  background: var(--gold-dim);
  border: 1px solid var(--gold-border-mid);
  border-radius: 7px; padding: 14px 18px;
  margin-bottom: 28px;
  display: flex; align-items: center; gap: 12px;
}
.lp-dot { width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0; }
.lp-text { font-size: 13px; color: var(--text-body); line-height: 1.5; }
.lp-text strong { color: var(--gold); font-weight: 700; }

/* ── NAV ── */
.step-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 20px; border-top: 1px solid var(--gold-border);
}
.btn-back {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  background: transparent; color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px; padding: 11px 20px;
  cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: var(--text-body); border-color: rgba(255,255,255,0.18); }
.btn-next {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--gold); color: var(--void);
  border: none; border-radius: 4px;
  padding: 11px 26px; cursor: pointer;
  transition: background 0.2s, transform 0.15s, opacity 0.2s;
}
.btn-next:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-next:not(:disabled):hover { background: var(--gold-bright); transform: translateY(-1px); }

/* ── EMAIL GATE ── */
.email-gate-body { padding: 44px 44px 38px; }
.gate-icon {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold-dim-mid);
  border: 1px solid var(--gold-border-mid);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.gate-icon svg { width: 22px; height: 22px; }
.gate-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.02em; color: var(--white);
  line-height: 1.15; margin-bottom: 10px;
}
.gate-title span { color: var(--gold); }
.gate-sub {
  font-size: 14px; color: var(--text-body);
  line-height: 1.7; margin-bottom: 28px; max-width: 400px;
}
.gate-preview-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 28px;
}
.gate-preview-card {
  background: var(--navy-mid);
  border: 1px solid var(--gold-border);
  border-radius: 8px; padding: 14px 16px;
}
.gpc-label {
  font-family: 'Syne', sans-serif;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 5px;
}
.gpc-value {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--gold); letter-spacing: -0.03em;
  filter: blur(7px); transition: filter 0.5s;
  user-select: none;
}
.gpc-value.revealed { filter: blur(0); }

.gate-fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.gate-input-group {}
.gate-label {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold-muted); margin-bottom: 7px; display: block;
}
.gate-input {
  width: 100%;
  background: var(--navy-mid);
  border: 1px solid var(--gold-border);
  border-radius: 7px; padding: 14px 16px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; color: var(--white); outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gate-input:focus { border-color: var(--gold-border-mid); background: var(--navy-light); }
.gate-input::placeholder { color: var(--text-muted); }
.gate-input.error { border-color: var(--error); }

.btn-reveal {
  width: 100%;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  background: var(--gold); color: var(--void);
  border: none; border-radius: 6px;
  padding: 16px; cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
}
.btn-reveal:hover { background: var(--gold-bright); transform: translateY(-1px); }
.btn-reveal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.gate-privacy {
  font-size: 11px; color: var(--text-muted);
  text-align: center; margin-top: 12px; line-height: 1.6;
}

.gate-error {
  font-size: 12px; color: var(--error);
  margin-top: 6px; display: none;
}
.gate-error.show { display: block; }

/* ── RESULTS SCREEN ── */
.results-wrap {
  width: 100%; max-width: 760px;
  animation: slideIn 0.42s cubic-bezier(0.4,0,0.2,1) both;
}

.results-header {
  margin-bottom: 24px;
}
.results-eyebrow {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--gold-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.results-eyebrow::before { content:''; width:16px; height:1px; background: var(--gold-muted); }
.results-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(28px, 4vw, 40px); font-weight: 800;
  letter-spacing: -0.025em; text-transform: uppercase;
  color: var(--white); line-height: 0.98;
}
.results-title span { color: var(--gold); }

.results-grid {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 16px;
  margin-top: 28px;
}

.r-card {
  background: var(--navy);
  border: 1px solid var(--gold-border);
  border-radius: 12px; padding: 24px 26px;
  position: relative; overflow: hidden;
}
.r-card::before {
  content:''; position:absolute; top:0;left:0;right:0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent 70%);
}
.r-card.hero {
  border-color: var(--gold-border-mid);
  background: var(--navy-mid);
  grid-row: span 2;
}
.r-card.hero::before {
  background: linear-gradient(90deg, var(--gold), var(--gold-bright) 50%, var(--gold));
}
.rc-eyebrow {
  font-family: 'Syne', sans-serif;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--gold-muted); margin-bottom: 10px;
}
.rc-big {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 54px; font-weight: 800;
  letter-spacing: -0.04em; line-height: 1;
  color: var(--gold); margin-bottom: 6px;
}
.r-card:not(.hero) .rc-big { font-size: 36px; }
.rc-unit { font-size: 20px; color: var(--gold-muted); font-weight: 700; }
.r-card:not(.hero) .rc-unit { font-size: 16px; }
.rc-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--text-muted); margin-bottom: 12px;
}
.rc-context {
  font-size: 13px; color: var(--text-body); line-height: 1.65;
  padding-top: 14px; border-top: 1px solid var(--gold-border);
}

/* breakdown bars */
.breakdown-section {
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--gold-border);
}
.bs-label {
  font-family: 'Syne', sans-serif;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 14px;
}
.bs-row { display: flex; flex-direction: column; gap: 12px; }
.bs-item { }
.bs-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
.bs-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.bs-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); }
.bs-track { height: 3px; background: rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.bs-fill {
  height: 100%; border-radius:2px;
  background: linear-gradient(90deg, var(--gold-muted), var(--gold));
  transition: width 1.0s cubic-bezier(0.4,0,0.2,1);
}

/* summary row */
.summary-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
  grid-column: 1 / -1; margin-top: 0;
}
.sum-card {
  background: var(--navy);
  border: 1px solid var(--gold-border);
  border-radius: 10px; padding: 18px 18px;
}
.sum-label {
  font-family: 'Syne', sans-serif;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 7px;
}
.sum-num {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.03em; color: var(--white);
}

  display: flex; align-items: center; gap: 5px;

/* Success state for button */
.btn-reveal.success-state {

}

@media (max-width: 700px) {
  .results-grid { grid-template-columns: 1fr; }
  .r-card.hero { grid-row: auto; }

}

  .summary-row { grid-template-columns: 1fr; }
  .rc-big { font-size: 40px; }
  .step-question { font-size: 20px; }
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="shell">
  <div class="logo-bar">
    <a href="index.html" style="font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-muted);text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:color .2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--gold-muted)'">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6H2M6 10l-4-4 4-4"/></svg>
      Back to Site
    </a>
    <div class="logo">GOLD ST <span>SOLUTIONS</span></div>
    <div class="logo-badge">Free Calculator</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-track" id="progressTrack">
    <div class="progress-steps" id="progressSteps"></div>
    <div class="progress-meta">
      <div class="progress-label" id="progressLabel">Getting started</div>
      <div class="progress-count" id="progressCount">Step 1 of 5</div>
    </div>
  </div>

  <!-- STEP CARD -->
  <div id="stepContainer"></div>

  <!-- RESULTS -->
  <div id="resultsContainer" style="display:none;width:100%;max-width:760px;"></div>
</div>

<script>
/* ════════════════════════════════════════════════
   GOOGLE FORM CONFIGURATION
   Replace these values after following setup guide
   ════════════════════════════════════════════════ */
const GOOGLE_FORM_ID   = '1FAIpQLSfrrdxX3lOtsJ1WQdxigQfCORUvEmKqaGlKQVlMB4LH3inFWA';
const ENTRY_FIRST_NAME = 'entry.2051845793';  // First Name
const ENTRY_EMAIL      = 'entry.2018595672';  // Email Address
const ENTRY_PROCESS    = 'entry.1477696490';  // Process Name
const ENTRY_TEAM       = 'entry.469616602';   // Team Size
const ENTRY_HOURS      = 'entry.1273735441';  // Hours Per Week
const ENTRY_RATE       = 'entry.1803992671';  // Hourly Cost
const ENTRY_REDUCTION  = 'entry.1206807115';  // AI Reduction %
const ENTRY_ANNUAL     = 'entry.124738686';   // Annual Cost
const ENTRY_SAVINGS    = 'entry.1481816862';  // Annual Savings
// Hours Saved — entry ID not available, skipped

/* ════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════ */
const TOTAL_STEPS = 5;
let state = {
  step: 0,
  processDesc: '',
  processCategory: '',
  team: null,
  hours: null,
  rate: null,
  reduction: 70,
  firstName: '',
  email: ''
};

const PROCESS_CATEGORIES = ['Lead', 'Sales', 'Onboarding', 'Delivery', 'Retention'];

const REDUCTION_CONTEXTS = {
  range: [20, 40, 60, 70, 80, 90, 95],
  labels: [
    'Basic automation — handles the most repetitive parts.',
    'Low automation — takes away the bulk data entry.',
    'Moderate automation — handles most routine tasks.',
    'Strong automation — typical for process-heavy workflows.',
    'High automation — most steps handled end-to-end.',
    'Very high automation — near-full elimination of manual work.',
    'Near-complete — only edge cases need human review.',
  ]
};

/* ════════════════════════════════════════════════
   STEPS CONFIG
   ════════════════════════════════════════════════ */
const STEPS = [
  {
    label: 'Choose Process',
    eyebrow: 'Step 1 of 5',
    render: renderStep1
  },
  {
    label: 'Team Size',
    eyebrow: 'Step 2 of 5',
    render: renderStep2
  },
  {
    label: 'Time Spent',
    eyebrow: 'Step 3 of 5',
    render: renderStep3
  },
  {
    label: 'Labor Cost',
    eyebrow: 'Step 4 of 5',
    render: renderStep4
  },
  {
    label: 'AI Reduction',
    eyebrow: 'Step 5 of 5',
    render: renderStep5
  }
];

/* ════════════════════════════════════════════════
   RENDER ENGINE
   ════════════════════════════════════════════════ */
function init() {
  renderProgressBar();
  renderCurrentStep();
}

function renderProgressBar() {
  const stepsEl = document.getElementById('progressSteps');
  stepsEl.innerHTML = STEPS.map((s, i) => {
    let cls = 'progress-step';
    if (i < state.step) cls += ' done';
    else if (i === state.step) cls += ' active';
    return `<div class="${cls}" title="${s.label}"></div>`;
  }).join('');
  document.getElementById('progressLabel').textContent = STEPS[state.step]?.label || '';
  document.getElementById('progressCount').textContent = `Step ${state.step + 1} of ${TOTAL_STEPS}`;
}

function renderCurrentStep() {
  const container = document.getElementById('stepContainer');
  container.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'step-card';
  card.id = 'activeCard';
  card.innerHTML = STEPS[state.step].render();
  container.appendChild(card);
  initStepListeners();
  updateNextBtn();
}

function transitionStep(direction) {
  const card = document.getElementById('activeCard');
  card.classList.add('sliding-out');
  setTimeout(() => {
    state.step += direction;
    renderProgressBar();
    renderCurrentStep();
  }, 200);
}

function nextStep() {
  if (state.step < STEPS.length - 1) {
    transitionStep(1);
  } else {
    showEmailGate();
  }
}

function prevStep() {
  if (state.step > 0) transitionStep(-1);
}

function updateNextBtn() {
  const btn = document.getElementById('btnNext');
  if (!btn) return;
  btn.disabled = !isStepValid();
}

function isStepValid() {
  switch(state.step) {
    case 0: return state.processDesc.length >= 5 && !!state.processCategory;
    case 1: return state.team !== null && state.team > 0;
    case 2: return state.hours !== null && state.hours > 0;
    case 3: return state.rate !== null && state.rate > 0;
    case 4: return true;
    default: return false;
  }
}

/* ════════════════════════════════════════════════
   STEP RENDERERS
   ════════════════════════════════════════════════ */
function renderStep1() {
  const catTiles = PROCESS_CATEGORIES.map(c => `
    <button class="option-tile ${state.processCategory === c ? 'selected' : ''}"
      onclick="selectCategory('${c}')">
      <span class="tile-dot"></span>
      <span class="tile-text">${c}</span>
    </button>
  `).join('');
  return `<div class="step-body">
    <div class="step-eyebrow">What are we calculating?</div>
    <div class="step-question">Describe the process that <span>eats the most time.</span></div>
    <div class="step-hint">Write a brief description, then tag which part of your business it belongs to.</div>
    <div class="number-input-wrap" style="margin-bottom:20px;">
      <textarea class="big-input" id="inputProcessDesc"
        placeholder="e.g. Manually following up with leads who filled out our contact form…"
        rows="3"
        style="resize:none; font-size:16px; font-family:'Plus Jakarta Sans',sans-serif; line-height:1.55; padding:16px 18px;"
        oninput="state.processDesc = this.value.trim(); updateNextBtn()"
      >${state.processDesc}</textarea>
    </div>
    <div class="field-section-label">Which area does this belong to?</div>
    <div class="option-tiles cat-tiles">${catTiles}</div>
    ${navHTML(false)}
  </div>`;
}

function renderStep2() {
  return `<div class="step-body">
    <div class="step-eyebrow">Team impact</div>
    <div class="step-question">How many people on your team handle <span>${state.processCategory.toLowerCase()} processes</span>?</div>
    <div class="step-hint">Include anyone who touches this process — even if it's only part of their role.</div>
    <div class="number-input-wrap">
      <div class="big-input-row">
        <input class="big-input" type="number" id="inputTeam" min="1" max="200"
          placeholder="3" value="${state.team || ''}"
          oninput="state.team = +this.value || null; updateLivePreview(); updateNextBtn()">
        <span class="big-suffix">people</span>
      </div>
    </div>
    ${livePreviewHTML()}
    ${navHTML(true)}
  </div>`;
}

function renderStep3() {
  return `<div class="step-body">
    <div class="step-eyebrow">Time cost</div>
    <div class="step-question">How many hours per week does <span>each person</span> spend on this?</div>
    <div class="step-hint">Be honest — include all the small moments: checking, chasing, updating, re-entering.</div>
    <div class="number-input-wrap">
      <div class="big-input-row">
        <input class="big-input" type="number" id="inputHours" min="0.5" max="40" step="0.5"
          placeholder="8" value="${state.hours || ''}"
          oninput="state.hours = +this.value || null; updateLivePreview(); updateNextBtn()">
        <span class="big-suffix">hrs / week each</span>
      </div>
    </div>
    ${livePreviewHTML()}
    ${navHTML(true)}
  </div>`;
}

function renderStep4() {
  return `<div class="step-body">
    <div class="step-eyebrow">Labor cost</div>
    <div class="step-question">What's the <span>fully-loaded</span> hourly cost of your team?</div>
    <div class="step-hint">Include salary + benefits + overhead. A $60K/yr employee costs roughly $40–50/hr fully loaded.</div>
    <div class="number-input-wrap">
      <div class="big-input-row">
        <span class="big-prefix">$</span>
        <input class="big-input" type="number" id="inputRate" min="10" max="500"
          placeholder="45" value="${state.rate || ''}"
          oninput="state.rate = +this.value || null; updateLivePreview(); updateNextBtn()">
        <span class="big-suffix">per hour</span>
      </div>
    </div>
    ${livePreviewHTML()}
    ${navHTML(true)}
  </div>`;
}

function renderStep5() {
  const pct = state.reduction;
  const contextIdx = REDUCTION_CONTEXTS.range.findIndex(r => r >= pct);
  const contextText = REDUCTION_CONTEXTS.labels[contextIdx >= 0 ? contextIdx : REDUCTION_CONTEXTS.labels.length - 1];
  return `<div class="step-body">
    <div class="step-eyebrow">AI impact</div>
    <div class="step-question">What % of this process could <span>AI handle</span>?</div>
    <div class="step-hint">Most repetitive business processes can be 60–90% automated. Be conservative if you're unsure.</div>
    <div class="slider-section">
      <div class="slider-value-display" id="sliderDisplay">${pct}<span>%</span></div>
      <input type="range" class="big-slider" id="reductionSlider"
        min="10" max="95" value="${pct}" step="5"
        oninput="updateReductionSlider(this)">
      <div class="slider-marks">
        <span class="slider-mark">10%</span>
        <span class="slider-mark">50%</span>
        <span class="slider-mark">95%</span>
      </div>
      <div class="slider-context" id="sliderContext">${contextText}</div>
    </div>
    ${livePreviewHTML()}
    <div class="step-nav">
      <button class="btn-back" onclick="prevStep()">← Back</button>
      <button class="btn-next" id="btnNext" onclick="nextStep()">See My Results →</button>
    </div>
  </div>`;
}

function navHTML(showBack) {
  return `<div class="step-nav">
    <button class="btn-back" style="${showBack ? '' : 'visibility:hidden'}" onclick="prevStep()">← Back</button>
    <button class="btn-next" id="btnNext" onclick="nextStep()">Next →</button>
  </div>`;
}

function livePreviewHTML() {
  const cost = calcAnnualCost();
  if (!cost) return '<div style="height:8px"></div>';
  return `<div class="live-preview">
    <div class="lp-dot"></div>
    <div class="lp-text">So far: <strong>${fmt(cost)} / year</strong> in manual labor costs for this process.</div>
  </div>`;
}

/* ════════════════════════════════════════════════
   LISTENERS & INTERACTIONS
   ════════════════════════════════════════════════ */
function initStepListeners() {
  updateAllSliderTracks();
}

function selectCategory(name) {
  state.processCategory = name;
  document.querySelectorAll('.cat-tiles .option-tile').forEach(t => {
    const selected = t.querySelector('.tile-text').textContent === name;
    t.classList.toggle('selected', selected);
    const dot = t.querySelector('.tile-dot');
    dot.style.background = selected ? 'var(--gold)' : '';
    dot.style.borderColor = selected ? 'var(--gold)' : '';
  });
  updateNextBtn();
}

function updateReductionSlider(el) {
  state.reduction = +el.value;
  document.getElementById('sliderDisplay').innerHTML = `${state.reduction}<span>%</span>`;
  const idx = REDUCTION_CONTEXTS.range.findIndex(r => r >= state.reduction);
  const txt = REDUCTION_CONTEXTS.labels[idx >= 0 ? idx : REDUCTION_CONTEXTS.labels.length - 1];
  document.getElementById('sliderContext').textContent = txt;
  updateSliderTrack(el);
  updateLivePreview();
}

function updateLivePreview() {
  const prev = document.querySelector('.live-preview');
  if (!prev) return;
  const cost = calcAnnualCost();
  if (cost) {
    prev.querySelector('.lp-text').innerHTML = `So far: <strong>${fmt(cost)} / year</strong> in manual labor costs for this process.`;
  }
}

function updateAllSliderTracks() {
  document.querySelectorAll('.big-slider').forEach(updateSliderTrack);
}

function updateSliderTrack(el) {
  const min = +el.min, max = +el.max, val = +el.value;
  const pct = ((val - min) / (max - min)) * 100;
  el.style.setProperty('--pct', pct + '%');
}

/* ════════════════════════════════════════════════
   EMAIL GATE
   ════════════════════════════════════════════════ */
function showEmailGate() {
  const annualCost = calcAnnualCost();
  const savings = calcSavings();

  const container = document.getElementById('stepContainer');
  container.innerHTML = '';
  document.getElementById('progressTrack').style.display = 'none';

  const card = document.createElement('div');
  card.className = 'step-card';
  card.innerHTML = `<div class="email-gate-body">
    <div class="gate-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
    </div>
    <div class="gate-title">Your results are <span>ready.</span></div>
    <div class="gate-sub">Enter your name and email to unlock your personalized cost breakdown and AI savings estimate.</div>

    <div class="gate-preview-row">
      <div class="gate-preview-card">
        <div class="gpc-label">Annual Cost</div>
        <div class="gpc-value" id="blurCost">${fmt(annualCost)}</div>
      </div>
      <div class="gate-preview-card">
        <div class="gpc-label">Potential Savings</div>
        <div class="gpc-value" id="blurSavings">${fmt(savings)}</div>
      </div>
    </div>

    <div class="gate-fields">
      <div class="gate-input-group">
        <label class="gate-label" for="gateFirstName">First Name</label>
        <input class="gate-input" type="text" id="gateFirstName"
          placeholder="Isabelle"
          oninput="state.firstName = this.value.trim(); validateGate()">
        <div class="gate-error" id="nameError">Please enter your first name.</div>
      </div>
      <div class="gate-input-group">
        <label class="gate-label" for="gateEmail">Work Email</label>
        <input class="gate-input" type="email" id="gateEmail"
          placeholder="you@yourbusiness.com"
          oninput="state.email = this.value.trim(); validateGate()">
        <div class="gate-error" id="emailError">Please enter a valid email address.</div>
      </div>
    </div>

    <button class="btn-reveal" id="btnReveal" onclick="submitAndReveal()" disabled>
      Reveal My Results →
    </button>
    <div class="gate-privacy">🔒 No spam, ever. Your results will be emailed to you.</div>
  </div>`;

  container.appendChild(card);
  document.getElementById('gateFirstName').focus();
}

function validateGate() {
  const nameOk = state.firstName.length > 0;
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.email);
  document.getElementById('btnReveal').disabled = !(nameOk && emailOk);
}

async function submitAndReveal() {
  const nameOk = state.firstName.length > 0;
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.email);

  document.getElementById('nameError').classList.toggle('show', !nameOk);
  document.getElementById('emailError').classList.toggle('show', !emailOk);
  document.getElementById('gateFirstName').classList.toggle('error', !nameOk);
  document.getElementById('gateEmail').classList.toggle('error', !emailOk);
  if (!nameOk || !emailOk) return;

  const btn = document.getElementById('btnReveal');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  // Unblur numbers for visual delight
  document.getElementById('blurCost')?.classList.add('revealed');
  document.getElementById('blurSavings')?.classList.add('revealed');

  // Submit to Google Form (fire-and-forget — don't block on CORS)
  submitToGoogleForm();

  // Transition to results after brief moment
  setTimeout(() => showResults(), 700);
}

function submitToGoogleForm() {
  const annualCost = calcAnnualCost();
  const savings = calcSavings();
  const hrsSaved = calcHoursSaved();

  const formData = new FormData();
  formData.append(ENTRY_FIRST_NAME, state.firstName);
  formData.append(ENTRY_EMAIL,      state.email);
  formData.append(ENTRY_PROCESS,    `[${state.processCategory}] ${state.processDesc}`);
  formData.append(ENTRY_TEAM,       state.team);
  formData.append(ENTRY_HOURS,      state.hours);
  formData.append(ENTRY_RATE,       '$' + state.rate + '/hr');
  formData.append(ENTRY_REDUCTION,  state.reduction + '%');
  formData.append(ENTRY_ANNUAL,     fmt(annualCost));
  formData.append(ENTRY_SAVINGS,    fmt(savings));

  const url = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
  fetch(url, { method: 'POST', body: formData, mode: 'no-cors' })
    .catch(() => {}); // Silent fail — CORS expected, submission goes through
}

/* ════════════════════════════════════════════════
   RESULTS
   ════════════════════════════════════════════════ */
function showResults() {
  document.getElementById('stepContainer').style.display = 'none';

  const annualCost = calcAnnualCost();
  const savings = calcSavings();
  const hrsSaved = calcHoursSaved();
  const totalAnnualHrs = state.team * state.hours * 52;
  const dailyCost = annualCost / 260;
  const weeklyCost = annualCost / 52;

  // Breakdown data
  const breakdown = [
    { name: 'Labor hours / year', val: Math.round(totalAnnualHrs).toLocaleString() + ' hrs', pct: 100 },
    { name: 'Cost at your hourly rate', val: fmt(annualCost), pct: 100 },
    { name: 'Portion AI can eliminate', val: state.reduction + '%', pct: state.reduction },
    { name: 'Value AI gives back', val: fmt(savings), pct: (savings / annualCost) * 100 },
  ];

  const breakdownHTML = breakdown.map(b => `
    <div class="bs-item">
      <div class="bs-top">
        <span class="bs-name">${b.name}</span>
        <span class="bs-val">${b.val}</span>
      </div>
      <div class="bs-track">
        <div class="bs-fill" style="width:0%" data-target="${b.pct}%"></div>
      </div>
    </div>`).join('');

  const rc = document.getElementById('resultsContainer');
  rc.style.display = 'block';
  rc.innerHTML = `
    <div class="results-wrap">
      <div class="results-header">
        <div class="results-eyebrow">Your AI Cost Analysis</div>
        <div class="results-title">Here's what <span>${state.processCategory.toLowerCase()}</span><br>is costing you.</div>
      </div>

      <div class="results-grid">

        <!-- Hero card -->
        <div class="r-card hero">
          <div class="rc-eyebrow">Annual Cost of This Process</div>
          <div class="rc-big">${fmt(annualCost)}</div>
          <div class="rc-sub">${Math.round(totalAnnualHrs).toLocaleString()} employee-hours / year</div>
          <div class="rc-context">
            That's <strong>${fmt(dailyCost)}</strong> every working day, or
            <strong>${fmt(weeklyCost)}</strong> every week — just to keep this one process running manually.
          </div>
          <div class="breakdown-section">
            <div class="bs-label">Cost Breakdown</div>
            <div class="bs-row">${breakdownHTML}</div>
          </div>
        </div>

        <!-- Savings card -->
        <div class="r-card">
          <div class="rc-eyebrow">Potential Annual Savings</div>
          <div class="rc-big">${fmt(savings)}</div>
          <div class="rc-sub">at ${state.reduction}% AI automation</div>
        </div>

        <!-- Hours card -->
        <div class="r-card">
          <div class="rc-eyebrow">Hours Recovered / Year</div>
          <div class="rc-big">${Math.round(hrsSaved).toLocaleString()}<span class="rc-unit"> hrs</span></div>
          <div class="rc-sub">back to your team annually</div>
          <div class="rc-context">What could your team do to grow the business with this time?</div>
        </div>

        <!-- Summary row -->
        <div class="summary-row">
          <div class="sum-card">
            <div class="sum-label">Team members affected</div>
            <div class="sum-num">${state.team}<span class="sum-unit"> people</span></div>
          </div>
          <div class="sum-card">
            <div class="sum-label">Hours wasted / week</div>
            <div class="sum-num">${state.team * state.hours}<span class="sum-unit"> hrs</span></div>
          </div>
          <div class="sum-card">
            <div class="sum-label">Cost per employee / yr</div>
            <div class="sum-num">${fmt(state.hours * 52 * state.rate)}</div>
          </div>
        </div>

        <!-- CTA -->
        <div class="results-cta">
          <div class="cta-inner">
            <div class="cta-copy">
              <div class="cta-kicker">Your next step</div>
              <div class="cta-headline">This is just one process.<br>What's the full picture?</div>
              <div class="cta-body-text">In a free 30-minute AI Audit, we map your top 3 opportunities across your entire business and estimate the revenue or time savings attached to each — yours to keep.</div>
            </div>
            <div class="cta-action">
              <a class="btn-book" href="https://www.goldstsolutions.com" target="_blank">Book Free AI Audit →</a>
              <button class="btn-recalc" onclick="restartCalculator()">Try Another Process</button>
            </div>
          </div>
          <div class="cta-pills">
            <div class="cta-pill"><div class="pill-dot"></div>$1,000 value — free</div>
            <div class="cta-pill"><div class="pill-dot"></div>30-minute call</div>
            <div class="cta-pill"><div class="pill-dot"></div>Limited to 10 spots/month</div>
            <div class="cta-pill"><div class="pill-dot"></div>No obligation</div>
          </div>
        </div>

      </div>
    </div>`;

  // Animate breakdown bars
  setTimeout(() => {
    rc.querySelectorAll('.bs-fill').forEach(el => {
      el.style.width = el.getAttribute('data-target');
    });
  }, 200);
}

function restartCalculator() {
  state = { step:0, processDesc:'', processCategory:'', team:null, hours:null, rate:null, reduction:70, firstName:'', email:'' };
  document.getElementById('resultsContainer').style.display = 'none';
  document.getElementById('stepContainer').style.display = 'block';
  document.getElementById('progressTrack').style.display = 'block';
  renderProgressBar();
  renderCurrentStep();
}

/* ════════════════════════════════════════════════
   CALCULATIONS
   ════════════════════════════════════════════════ */
function calcAnnualCost() {
  if (!state.team || !state.hours || !state.rate) return 0;
  return state.team * state.hours * 52 * state.rate;
}
function calcSavings() {
  return calcAnnualCost() * (state.reduction / 100);
}
function calcHoursSaved() {
  if (!state.team || !state.hours) return 0;
  return state.team * state.hours * 52 * (state.reduction / 100);
}

function fmt(n) {
  if (!n || isNaN(n)) return '—';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + Math.round(n).toLocaleString();
}

init();
</script>
